<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a0a15;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="body1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff0055;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#ff3388;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#00fbff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0088ff;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="stripe1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="320" height="180" fill="url(#bg1)" rx="8"/>
  <!-- Grid lines -->
  <line x1="0" y1="60" x2="320" y2="60" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="120" x2="320" y2="120" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="160" y1="0" x2="160" y2="180" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- Ground reflection glow -->
  <ellipse cx="160" cy="155" rx="140" ry="15" fill="url(#body1)" opacity="0.08"/>
  <!-- Car body - RX-7 FD silhouette (3/4 view) -->
  <!-- Shadow -->
  <ellipse cx="160" cy="148" rx="120" ry="8" fill="rgba(0,0,0,0.4)"/>
  <!-- Main body -->
  <path d="M40,120 L35,115 Q30,100 45,90 L60,85 L80,72 Q90,65 105,60 L140,55 L200,52 L230,55 Q245,58 255,62 L275,70 L290,80 Q300,90 305,100 L310,115 L308,120 L300,125 L275,128 L240,130 L80,130 L45,128 Z" fill="url(#body1)"/>
  <!-- Hood stripe -->
  <path d="M100,60 L140,55 L200,52 L230,55 L240,65 L140,65 Z" fill="url(#stripe1)" opacity="0.5"/>
  <!-- Racing stripe center -->
  <rect x="55" y="102" width="220" height="3" fill="#ffffff" opacity="0.2"/>
  <rect x="50" y="118" width="225" height="2" fill="#ffffff" opacity="0.15"/>
  <!-- Spoiler -->
  <path d="M255,62 L270,50 L285,52 L275,65 Z" fill="#222222"/>
  <path d="M270,50 L285,52 L285,48 L270,46 Z" fill="#333333"/>
  <!-- Windows -->
  <path d="M90,70 Q100,63 115,61 L170,58 L175,70 L100,72 Z" fill="#1a1a2e" opacity="0.7"/>
  <path d="M175,58 L200,54 L220,55 L225,68 L180,70 Z" fill="#1a1a2e" opacity="0.7"/>
  <!-- Side skirt -->
  <rect x="70" y="115" width="185" height="3" rx="1" fill="#111111"/>
  <!-- Neon underglow -->
  <path d="M60,125 L260,125 L255,130 L65,130 Z" fill="#00fbff" opacity="0.15" filter="url(#glow1)"/>
  <!-- Wheels -->
  <circle cx="100" cy="128" r="16" fill="#111111" stroke="#333333" stroke-width="2"/>
  <circle cx="100" cy="128" r="8" fill="#222222" stroke="#444444" stroke-width="1"/>
  <circle cx="230" cy="128" r="16" fill="#111111" stroke="#333333" stroke-width="2"/>
  <circle cx="230" cy="128" r="8" fill="#222222" stroke="#444444" stroke-width="1"/>
  <!-- Headlight glow -->
  <ellipse cx="308" cy="100" rx="5" ry="8" fill="#00fbff" opacity="0.3" filter="url(#glow1)"/>
  <ellipse cx="308" cy="100" rx="2" ry="4" fill="#00fbff" opacity="0.6"/>
  <!-- Tail light -->
  <rect x="38" y="95" width="4" height="10" rx="1" fill="#ff0055" opacity="0.5"/>
  <!-- Decals - kanji -->
  <text x="170" y="95" font-family="sans-serif" font-size="8" fill="#ffffff" opacity="0.4" font-weight="bold">東京 D R I F T</text>
  <!-- Side number -->
  <text x="155" y="115" font-family="monospace" font-size="14" fill="#ffffff" opacity="0.2" font-weight="bold">69</text>
  <!-- Sponsors -->
  <rect x="120" y="86" width="50" height="3" rx="1" fill="#ffffff" opacity="0.08"/>
  <!-- Exhaust -->
  <ellipse cx="35" cy="118" rx="3" ry="2" fill="#444444"/>
  <path d="M40,118 L30,118" stroke="#ff6622" stroke-width="1" opacity="0.2"/>
</svg>
