<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020205;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#050510;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#020208;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="body6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#eeeeee;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#1a1a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#111122;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="race-stripe" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff0055;stop-opacity:0.3"/>
      <stop offset="30%" style="stop-color:#ff0055;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.8"/>
      <stop offset="70%" style="stop-color:#0044ff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#0044ff;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="glow6">
      <feGaussianBlur stdDeviation="2"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="320" height="180" fill="url(#bg6)" rx="8"/>
  <!-- Checkered flag pattern -->
  <g opacity="0.03">
    <rect x="0" y="0" width="8" height="8" fill="#ffffff"/>
    <rect x="16" y="0" width="8" height="8" fill="#ffffff"/>
    <rect x="8" y="8" width="8" height="8" fill="#ffffff"/>
    <rect x="24" y="8" width="8" height="8" fill="#ffffff"/>
  </g>
  <!-- Shadow -->
  <ellipse cx="160" cy="148" rx="120" ry="8" fill="rgba(0,0,0,0.5)"/>
  <!-- Honda NSX-R silhouette -->
  <path d="M45,120 L40,114 Q38,102 50,90 L60,84 L72,74 Q85,66 102,60 L140,55 L185,54 L215,56 L240,60 Q258,65 272,72 L288,82 Q302,94 308,106 L312,120 L310,124 L298,128 L268,130 L220,132 L85,132 L55,128 Z" fill="url(#body6)"/>
  <!-- Racing livery stripes -->
  <rect x="50" y="75" width="235" height="3" fill="url(#race-stripe)"/>
  <rect x="45" y="108" width="240" height="1.5" fill="#ff0055" opacity="0.1"/>
  <!-- Sponsor decals -->
  <text x="155" y="95" font-family="sans-serif" font-size="4" fill="#ffffff" opacity="0.12" letter-spacing="3">RACING TEAM</text>
  <text x="155" y="102" font-family="sans-serif" font-size="4" fill="#ffffff" opacity="0.08" letter-spacing="2">MOTORSPORT</text>
  <!-- Race number circle -->
  <circle cx="160" cy="115" r="16" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.1"/>
  <text x="152" y="120" font-family="monospace" font-size="16" fill="#ffffff" opacity="0.15" font-weight="bold">1</text>
  <!-- Windows -->
  <path d="M95,68 Q110,62 140,59 L180,58 L190,66 L105,70 Z" fill="#0a0a12" opacity="0.8"/>
  <path d="M185,58 L215,60 L225,67 L195,66 Z" fill="#0a0a12" opacity="0.8"/>
  <!-- Front splitter -->
  <rect x="48" y="120" width="55" height="3" rx="1" fill="#111118"/>
  <!-- Diffuser -->
  <rect x="200" y="121" width="55" height="4" rx="1" fill="#111118"/>
  <!-- Side skirt -->
  <rect x="78" y="115" width="165" height="2" rx="1" fill="#111118"/>
  <!-- Spoiler -->
  <path d="M262,62 L278,44 L295,46 L282,64 Z" fill="#111118"/>
  <path d="M278,42 L295,44 L295,40 L278,38 Z" fill="#1a1a2e"/>
  <!-- Wheels - race spec -->
  <circle cx="102" cy="128" r="16" fill="#0a0a0a" stroke="#ff0055" stroke-width="1.5"/>
  <circle cx="102" cy="128" r="7" fill="#1a1a2e" stroke="#0044ff" stroke-width="1"/>
  <circle cx="228" cy="128" r="16" fill="#0a0a0a" stroke="#ff0055" stroke-width="1.5"/>
  <circle cx="228" cy="128" r="7" fill="#1a1a2e" stroke="#0044ff" stroke-width="1"/>
  <!-- Blue racing strip -->
  <rect x="50" y="100" width="235" height="1.5" fill="#0044ff" opacity="0.08"/>
  <!-- Neon underglow -->
  <path d="M55,126 L270,126 L265,132 L60,132 Z" fill="#0044ff" opacity="0.06" filter="url(#glow6)"/>
  <!-- Headlight -->
  <ellipse cx="310" cy="98" rx="3" ry="5" fill="#ffffff" opacity="0.1"/>
  <ellipse cx="310" cy="98" rx="1.5" ry="2.5" fill="#ffffff" opacity="0.2"/>
  <!-- Tail light -->
  <rect x="42" y="88" width="2" height="14" rx="1" fill="#ff0055" opacity="0.3"/>
  <!-- Exhaust - center -->
  <ellipse cx="42" cy="120" rx="3" ry="2" fill="#333"/>
  <!-- Hood scoop -->
  <rect x="120" y="60" width="20" height="6" rx="2" fill="#111118" stroke="#333333" stroke-width="0.5"/>
</svg>
