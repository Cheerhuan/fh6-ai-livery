<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0508;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#15080f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0205;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="body4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff88aa;stop-opacity:1"/>
      <stop offset="30%" style="stop-color:#ffb3c6;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#ff69b4;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#cc3377;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="sakura-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb3c6;stop-opacity:0.2"/>
      <stop offset="50%" style="stop-color:#ff69b4;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#ffb3c6;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="petal-blur">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
  </defs>
  <rect width="320" height="180" fill="url(#bg4)" rx="8"/>
  <!-- Floating cherry blossom petals -->
  <g opacity="0.15">
    <ellipse cx="50" cy="30" rx="3" ry="2" fill="#ffb3c6" transform="rotate(30,50,30)"/>
    <ellipse cx="120" cy="15" rx="2.5" ry="1.5" fill="#ff69b4" transform="rotate(-20,120,15)"/>
    <ellipse cx="200" cy="25" rx="3" ry="2" fill="#ffb3c6" transform="rotate(45,200,25)"/>
    <ellipse cx="280" cy="20" rx="2" ry="1.5" fill="#ff88aa" transform="rotate(-35,280,20)"/>
    <ellipse cx="80" cy="45" rx="2" ry="1" fill="#ffc0cb" transform="rotate(15,80,45)"/>
    <ellipse cx="250" cy="40" rx="2.5" ry="1.5" fill="#ff69b4" transform="rotate(-25,250,40)"/>
    <ellipse cx="30" cy="55" rx="2" ry="1" fill="#ffb3c6" transform="rotate(60,30,55)"/>
    <ellipse cx="300" cy="50" rx="2" ry="1.5" fill="#ffc0cb" transform="rotate(-40,300,50)"/>
  </g>
  <!-- Ground reflection -->
  <ellipse cx="160" cy="155" rx="140" ry="15" fill="#ff69b4" opacity="0.05"/>
  <!-- Shadow -->
  <ellipse cx="160" cy="148" rx="120" ry="8" fill="rgba(0,0,0,0.4)"/>
  <!-- Subaru WRX STI silhouette -->
  <path d="M42,120 L38,115 Q35,104 48,92 L60,85 L75,76 Q88,68 105,63 L145,58 L185,56 L220,58 Q240,62 255,70 L272,80 Q288,92 295,106 L300,120 L298,124 L285,128 L255,130 L210,132 L85,132 L52,128 Z" fill="url(#body4)"/>
  <!-- Sakura pattern overlay on body -->
  <g opacity="0.08">
    <circle cx="100" cy="85" r="4" fill="none" stroke="#ffffff" stroke-width="0.5"/>
    <circle cx="100" cy="85" r="2" fill="#ffffff"/>
    <circle cx="150" cy="80" r="3.5" fill="none" stroke="#ffffff" stroke-width="0.5"/>
    <circle cx="150" cy="80" r="1.5" fill="#ffffff"/>
    <circle cx="200" cy="82" r="3" fill="none" stroke="#ffffff" stroke-width="0.5"/>
    <circle cx="200" cy="82" r="1.5" fill="#ffffff"/>
    <circle cx="80" cy="100" r="3" fill="none" stroke="#ffffff" stroke-width="0.5"/>
    <circle cx="80" cy="100" r="1.5" fill="#ffffff"/>
    <circle cx="230" cy="90" r="2.5" fill="none" stroke="#ffffff" stroke-width="0.5"/>
    <circle cx="230" cy="90" r="1" fill="#ffffff"/>
  </g>
  <!-- Hood sakura gradient -->
  <rect x="75" y="62" width="165" height="4" fill="url(#sakura-grad)"/>
  <!-- Windows -->
  <path d="M95,68 Q110,60 140,57 L180,56 L190,65 L105,70 Z" fill="#1a0a12" opacity="0.8"/>
  <path d="M185,56 L215,58 L225,66 L195,65 Z" fill="#1a0a12" opacity="0.8"/>
  <!-- Neon accent stripe -->
  <rect x="50" y="103" width="230" height="1.5" fill="#ffffff" opacity="0.1"/>
  <!-- Spoiler -->
  <path d="M258,65 L272,50 L288,52 L278,66 Z" fill="#1a0a12"/>
  <path d="M272,50 L288,52 L288,48 L272,46 Z" fill="#221115"/>
  <!-- Decal text -->
  <text x="158" y="95" font-family="serif" font-size="7" fill="#ffffff" opacity="0.2" font-style="italic">Sakura</text>
  <!-- Wheels -->
  <circle cx="100" cy="128" r="16" fill="#1a0a12" stroke="#ff88aa" stroke-width="1.5"/>
  <circle cx="100" cy="128" r="7" fill="#2a1520" stroke="#ff88aa" stroke-width="0.5"/>
  <circle cx="228" cy="128" r="16" fill="#1a0a12" stroke="#ff88aa" stroke-width="1.5"/>
  <circle cx="228" cy="128" r="7" fill="#2a1520" stroke="#ff88aa" stroke-width="0.5"/>
  <!-- Neon underglow -->
  <path d="M60,125 L268,125 L263,131 L65,131 Z" fill="#ff69b4" opacity="0.1" filter="url(#glow4)"/>
  <!-- Headlight -->
  <ellipse cx="298" cy="100" rx="3" ry="5" fill="#ffb3c6" opacity="0.15"/>
  <ellipse cx="298" cy="100" rx="1.5" ry="2.5" fill="#ffb3c6" opacity="0.25"/>
  <!-- Tail light -->
  <rect x="39" y="90" width="2" height="14" rx="1" fill="#ff0055" opacity="0.35"/>
  <!-- Exhaust -->
  <ellipse cx="36" cy="120" rx="2.5" ry="1.5" fill="#333"/>
  <!-- Diffuser -->
  <rect x="45" y="120" width="30" height="4" rx="1" fill="#1a0a12"/>
</svg>
