<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060608;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#0a0808;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#040404;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="body5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1a0a;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#4a3020;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#cccccc;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#aaaaaa;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="rivet-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff0055;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#ff0055;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#ff0055;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow5">
      <feGaussianBlur stdDeviation="2"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="320" height="180" fill="url(#bg5)" rx="8"/>
  <!-- Track background -->
  <g opacity="0.04">
    <rect x="0" y="0" width="320" height="180" fill="none" stroke="#ff0055" stroke-width="0.3" stroke-dasharray="4,4"/>
  </g>
  <!-- Shadow -->
  <ellipse cx="160" cy="148" rx="130" ry="10" fill="rgba(0,0,0,0.6)"/>
  <!-- Nissan Silvia S15 widebody silhouette -->
  <path d="M40,122 L36,116 Q33,103 46,90 L58,83 L72,74 Q85,66 100,61 L140,56 L180,54 L210,56 L235,60 Q255,65 270,72 L288,83 Q302,95 308,108 L312,122 L310,126 L298,130 L268,132 L220,134 L85,134 L50,130 Z" fill="url(#body5)"/>
  <!-- Widebody rivet fenders -->
  <!-- Front fender -->
  <path d="M55,118 L50,105 Q48,95 58,88 L70,78 L78,82 Q62,95 60,110 L62,120 Z" fill="#2a1a0a" opacity="0.8"/>
  <!-- Rear fender -->
  <path d="M215,118 L210,100 Q208,88 222,78 L235,72 L242,76 Q225,90 222,108 L224,120 Z" fill="#2a1a0a" opacity="0.8"/>
  <!-- Rivets on front fender -->
  <g fill="#888888" opacity="0.3">
    <circle cx="60" cy="105" r="1.5"/>
    <circle cx="62" cy="95" r="1.5"/>
    <circle cx="65" cy="88" r="1.5"/>
    <circle cx="70" cy="82" r="1.5"/>
    <circle cx="218" cy="105" r="1.5"/>
    <circle cx="218" cy="95" r="1.5"/>
    <circle cx="220" cy="88" r="1.5"/>
    <circle cx="224" cy="80" r="1.5"/>
  </g>
  <!-- Racing stripe -->
  <rect x="48" y="108" width="240" height="2" fill="#ff0055" opacity="0.15"/>
  <rect x="48" y="111" width="240" height="1" fill="#ffffff" opacity="0.08"/>
  <!-- Sponsor decals -->
  <text x="135" y="98" font-family="sans-serif" font-size="5" fill="#ffffff" opacity="0.12" letter-spacing="2">LIBERTY WALK</text>
  <text x="140" y="116" font-family="monospace" font-size="4" fill="#ffffff" opacity="0.08">WIDE / RACE SPEC</text>
  <!-- Side number -->
  <text x="115" y="128" font-family="monospace" font-size="22" fill="#ff0055" opacity="0.1" font-weight="bold">55</text>
  <!-- Windows -->
  <path d="M95,68 Q110,60 140,57 L180,56 L190,65 L105,70 Z" fill="#0a0a0a" opacity="0.8"/>
  <path d="M185,56 L210,58 L220,65 L195,65 Z" fill="#0a0a0a" opacity="0.8"/>
  <!-- Spoiler - aggressive GT wing -->
  <path d="M258,65 L275,46 L298,48 L285,66 Z" fill="#1a1a1a"/>
  <path d="M275,44 L298,46 L298,42 L275,40 Z" fill="#222222"/>
  <rect x="268" y="48" width="2" height="18" fill="#333333"/>
  <rect x="290" y="48" width="2" height="18" fill="#333333"/>
  <!-- Side skirt extension -->
  <rect x="78" y="116" width="170" height="3" rx="1" fill="#1a1a1a"/>
  <!-- Splitters -->
  <rect x="50" y="122" width="45" height="3" rx="1" fill="#151515"/>
  <rect x="225" y="122" width="40" height="3" rx="1" fill="#151515"/>
  <!-- Diffuser -->
  <rect x="50" y="123" width="35" height="4" rx="1" fill="#111111"/>
  <!-- Wheels -->
  <circle cx="102" cy="128" r="17" fill="#0a0a0a" stroke="#333333" stroke-width="2"/>
  <circle cx="102" cy="128" r="7" fill="#1a1a1a" stroke="#444444" stroke-width="1"/>
  <circle cx="228" cy="128" r="17" fill="#0a0a0a" stroke="#333333" stroke-width="2"/>
  <circle cx="228" cy="128" r="7" fill="#1a1a1a" stroke="#444444" stroke-width="1"/>
  <!-- Neon underglow -->
  <path d="M55,126 L275,126 L270,132 L60,132 Z" fill="#ff0055" opacity="0.08" filter="url(#glow5)"/>
  <!-- Headlight -->
  <ellipse cx="310" cy="100" rx="3" ry="5" fill="#ffaa33" opacity="0.12"/>
  <ellipse cx="310" cy="100" rx="1.5" ry="2.5" fill="#ffaa33" opacity="0.25"/>
  <!-- Tail light -->
  <rect x="37" y="88" width="2" height="15" rx="1" fill="#ff0055" opacity="0.3"/>
  <!-- Exhaust - dual -->
  <ellipse cx="35" cy="122" rx="2.5" ry="1.5" fill="#333"/>
  <ellipse cx="42" cy="122" rx="2.5" ry="1.5" fill="#333"/>
</svg>
