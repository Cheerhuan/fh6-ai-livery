<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050510;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#0a0520;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#020208;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="body2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#1a0a3a;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#7b2ff7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff0055;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cyber-grid" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00fbff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00fbff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#00fbff;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="320" height="180" fill="url(#bg2)" rx="8"/>
  <!-- Cyber grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="30" x2="320" y2="30" stroke="#00fbff" stroke-width="0.5"/>
    <line x1="0" y1="60" x2="320" y2="60" stroke="#00fbff" stroke-width="0.5"/>
    <line x1="0" y1="90" x2="320" y2="90" stroke="#00fbff" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="320" y2="120" stroke="#00fbff" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="320" y2="150" stroke="#00fbff" stroke-width="0.5"/>
    <line x1="40" y1="0" x2="40" y2="180" stroke="#00fbff" stroke-width="0.5"/>
    <line x1="80" y1="0" x2="80" y2="180" stroke="#00fbff" stroke-width="0.5"/>
    <line x1="120" y1="0" x2="120" y2="180" stroke="#00fbff" stroke-width="0.5"/>
    <line x1="160" y1="0" x2="160" y2="180" stroke="#00fbff" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="180" stroke="#00fbff" stroke-width="0.5"/>
    <line x1="240" y1="0" x2="240" y2="180" stroke="#00fbff" stroke-width="0.5"/>
    <line x1="280" y1="0" x2="280" y2="180" stroke="#00fbff" stroke-width="0.5"/>
  </g>
  <!-- Ground reflection -->
  <ellipse cx="160" cy="155" rx="140" ry="15" fill="#7b2ff7" opacity="0.06"/>
  <!-- Shadow -->
  <ellipse cx="160" cy="148" rx="120" ry="8" fill="rgba(0,0,0,0.5)"/>
  <!-- GT-R R35 silhouette -->
  <path d="M35,118 L30,112 Q28,100 40,88 L55,80 L75,70 Q90,62 110,58 L170,54 L210,56 L240,60 Q260,64 275,72 L295,82 Q310,92 315,105 L318,118 L315,122 L305,125 L270,128 L220,130 L80,130 L45,128 Z" fill="url(#body2)"/>
  <!-- Circuit board pattern on body -->
  <g opacity="0.12">
    <rect x="80" y="80" width="8" height="8" fill="none" stroke="#00fbff" stroke-width="0.5"/>
    <rect x="90" y="78" width="6" height="6" fill="none" stroke="#00fbff" stroke-width="0.5"/>
    <rect x="180" y="72" width="10" height="10" fill="none" stroke="#00fbff" stroke-width="0.5"/>
    <rect x="200" y="76" width="6" height="8" fill="none" stroke="#00fbff" stroke-width="0.5"/>
    <line x1="88" y1="84" x2="180" y2="77" stroke="#00fbff" stroke-width="0.3"/>
    <line x1="185" y1="77" x2="200" y2="80" stroke="#00fbff" stroke-width="0.3"/>
  </g>
  <!-- Windows -->
  <path d="M95,68 Q110,60 140,57 L180,55 L190,65 L105,70 Z" fill="#0a0a1a" opacity="0.8"/>
  <path d="M185,55 L215,58 L225,66 L195,65 Z" fill="#0a0a1a" opacity="0.8"/>
  <!-- Neon accent stripe -->
  <rect x="45" y="100" width="240" height="2" fill="#00fbff" opacity="0.3"/>
  <rect x="45" y="113" width="240" height="1.5" fill="#ff0055" opacity="0.2"/>
  <!-- Side number -->
  <text x="140" y="112" font-family="monospace" font-size="18" fill="#00fbff" opacity="0.15" font-weight="bold">404</text>
  <!-- Cyber decal text -->
  <text x="130" y="90" font-family="monospace" font-size="6" fill="#00fbff" opacity="0.3">CYBER://PHANTOM</text>
  <!-- Spoiler -->
  <path d="M265,62 L280,48 L295,50 L285,65 Z" fill="#111118"/>
  <path d="M280,48 L295,50 L295,46 L280,44 Z" fill="#1a1a2e"/>
  <!-- Holographic accent lines -->
  <path d="M55,104 L135,104" stroke="#7b2ff7" stroke-width="1" opacity="0.15"/>
  <!-- Wheels -->
  <circle cx="100" cy="128" r="16" fill="#0a0a0a" stroke="#7b2ff7" stroke-width="1.5"/>
  <circle cx="100" cy="128" r="7" fill="#1a1a2e" stroke="#333333" stroke-width="1"/>
  <circle cx="230" cy="128" r="16" fill="#0a0a0a" stroke="#7b2ff7" stroke-width="1.5"/>
  <circle cx="230" cy="128" r="7" fill="#1a1a2e" stroke="#333333" stroke-width="1"/>
  <!-- Neon underglow -->
  <path d="M60,125 L260,125 L255,130 L65,130 Z" fill="#7b2ff7" opacity="0.12" filter="url(#glow2)"/>
  <!-- Headlight -->
  <ellipse cx="312" cy="98" rx="4" ry="6" fill="#ff0055" opacity="0.2" filter="url(#glow2)"/>
  <ellipse cx="312" cy="98" rx="2" ry="3" fill="#ff0055" opacity="0.4"/>
  <!-- Tail light glow -->
  <rect x="32" y="92" width="3" height="12" rx="1" fill="#ff0055" opacity="0.4" filter="url(#glow2)"/>
  <!-- Exhaust -->
  <ellipse cx="30" cy="118" rx="3" ry="2" fill="#444"/>
  <!-- Side skirt -->
  <rect x="75" y="115" width="175" height="2" rx="1" fill="#111118"/>
</svg>
