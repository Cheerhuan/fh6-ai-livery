<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080602;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#0a0805;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#050402;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="body3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1"/>
      <stop offset="30%" style="stop-color:#2a2520;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#ff6b00;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#cc4400;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="orange-glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b00;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ff6b00;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="320" height="180" fill="url(#bg3)" rx="8"/>
  <!-- Tokyo street reflection -->
  <g opacity="0.04">
    <rect x="20" y="130" width="8" height="50" fill="#ff6b00"/>
    <rect x="45" y="130" width="8" height="50" fill="#ff6b00"/>
    <rect x="80" y="130" width="8" height="50" fill="#ff6b00"/>
    <rect x="130" y="130" width="8" height="50" fill="#ff6b00"/>
    <rect x="170" y="130" width="8" height="50" fill="#ff6b00"/>
    <rect x="220" y="130" width="8" height="50" fill="#ff6b00"/>
    <rect x="270" y="130" width="8" height="50" fill="#ff6b00"/>
  </g>
  <!-- Shadow -->
  <ellipse cx="160" cy="148" rx="120" ry="8" fill="rgba(0,0,0,0.5)"/>
  <!-- Toyota Supra MK5 silhouette -->
  <path d="M38,120 L35,115 Q32,102 45,90 L58,82 L78,72 Q90,65 110,60 L150,56 L195,55 L225,58 Q245,62 260,70 L280,82 Q298,95 305,108 L310,120 L308,124 L295,128 L265,130 L215,132 L85,132 L48,128 Z" fill="url(#body3)"/>
  <!-- Hood accent -->
  <rect x="75" y="65" width="160" height="3" fill="#111111" opacity="0.6"/>
  <!-- Racing stripe - JDM-style -->
  <path d="M55,105 L280,105" stroke="#ffffff" stroke-width="1.5" opacity="0.08"/>
  <path d="M55,110 L280,110" stroke="#ffffff" stroke-width="1" opacity="0.05"/>
  <!-- Sponsor decals -->
  <text x="145" y="97" font-family="sans-serif" font-size="5" fill="#ffffff" opacity="0.15" letter-spacing="1">JDM RACING</text>
  <text x="145" y="116" font-family="sans-serif" font-size="5" fill="#ffffff" opacity="0.1" letter-spacing="1">TOKYO STREET</text>
  <!-- Side number -->
  <text x="122" y="128" font-family="monospace" font-size="20" fill="#ff6b00" opacity="0.12" font-weight="bold">27</text>
  <!-- Windows -->
  <path d="M95,68 Q110,60 140,57 L180,56 L190,65 L105,70 Z" fill="#111115" opacity="0.8"/>
  <path d="M185,56 L215,58 L225,66 L195,65 Z" fill="#111115" opacity="0.8"/>
  <!-- Spoiler -->
  <path d="L260,62 L275,48 L292,50 L282,65 Z" fill="#151515"/>
  <path d="M275,48 L292,50 L292,46 L275,44 Z" fill="#222222"/>
  <!-- Side skirt -->
  <rect x="80" y="115" width="170" height="2" rx="1" fill="#111111"/>
  <!-- Splitter -->
  <rect x="48" y="120" width="60" height="3" rx="1" fill="#151515"/>
  <!-- Wheels -->
  <circle cx="100" cy="128" r="16" fill="#0a0a0a" stroke="#333333" stroke-width="2"/>
  <circle cx="100" cy="128" r="7" fill="#1a1a1a" stroke="#555555" stroke-width="1"/>
  <circle cx="230" cy="128" r="16" fill="#0a0a0a" stroke="#333333" stroke-width="2"/>
  <circle cx="230" cy="128" r="7" fill="#1a1a1a" stroke="#555555" stroke-width="1"/>
  <!-- Neon underglow -->
  <path d="M60,126 L270,126 L265,132 L65,132 Z" fill="#ff6b00" opacity="0.08" filter="url(#glow3)"/>
  <!-- Headlight -->
  <ellipse cx="308" cy="100" rx="3" ry="6" fill="#ffaa33" opacity="0.15"/>
  <ellipse cx="308" cy="100" rx="1.5" ry="3" fill="#ffaa33" opacity="0.3"/>
  <!-- Tail light -->
  <rect x="36" y="90" width="2" height="14" rx="1" fill="#ff0055" opacity="0.3"/>
  <!-- Exhaust -->
  <ellipse cx="33" cy="120" rx="3" ry="2" fill="#333"/>
  <path d="M35,120 L25,120" stroke="#ff6622" stroke-width="1" opacity="0.15"/>
  <!-- Carbon fiber pattern on hood -->
  <g opacity="0.06">
    <path d="M75,68 L100,68 L100,75 L75,75 Z" fill="none" stroke="#666" stroke-width="0.3"/>
    <path d="M100,68 L125,68 L125,75 L100,75 Z" fill="none" stroke="#666" stroke-width="0.3"/>
    <path d="M125,68 L150,68 L150,75 L125,75 Z" fill="none" stroke="#666" stroke-width="0.3"/>
    <path d="M150,68 L175,68 L175,75 L150,75 Z" fill="none" stroke="#666" stroke-width="0.3"/>
    <path d="M75,75 L100,75 L100,82 L75,82 Z" fill="none" stroke="#666" stroke-width="0.3"/>
    <path d="M100,75 L125,75 L125,82 L100,82 Z" fill="none" stroke="#666" stroke-width="0.3"/>
  </g>
</svg>
